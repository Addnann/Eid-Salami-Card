<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card-container">
        <div class="card">
            <div class="stars-container">
                <span class="star s1"></span><span class="star s2"></span><span class="star s3"></span>
                <span class="star s4"></span><span class="star s5"></span><span class="star s6"></span>
                <span class="star s7"></span><span class="star s8"></span><span class="star s9"></span>
                <span class="star s10"></span><span class="star s11"></span><span class="star s12"></span>
                <span class="star s13"></span><span class="star s14"></span><span class="star s15"></span>
            </div>

            <div class="moon-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="#4fd1c5"/>
                </svg>
            </div>

            <h1 class="eid-title">ঈদ মোবারক</h1>
            <p class="eid-wish">ঈদ মোবারক! আপনার জন্য অনেক শুভকামনা রইলো। 🌙</p>

            <div class="bkash-box">
                <div class="bkash-logo">bKash</div>
                <h2 class="phone-number" id="copyNum">01611459687</h2>
                <p class="instruction">সালামি পাঠাতে এই নম্বরে পাঠান</p>
            </div>

            <div class="qr-section">
                <div class="qr-image-container">
                    <img src="QR.png" alt="QR">
                </div>
                <p class="scan-text">স্ক্যান করে পাঠান</p>
            </div>
            
            <div class="mosque-png-art"></div>
        </div>
    </div>

    <footer class="main-footer">
        <p>ঈদ মোবারক 🌙 Made with ❤️ by Adnan</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
